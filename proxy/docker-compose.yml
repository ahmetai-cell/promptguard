services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: promptguard
      POSTGRES_USER: pg
      POSTGRES_PASSWORD: pg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pg -d promptguard"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://pg:pg@db:5432/promptguard
      PG_TOKEN: ""
      RATE_LIMIT_MAX: "200"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
