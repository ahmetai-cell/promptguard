name: Agent

# Runs every Monday at 06:00 UTC. Also triggerable manually.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — print proposals without opening a PR"
        type: boolean
        default: false

jobs:
  agent:
    name: Weekly Pattern Analysis
    runs-on: ubuntu-latest

    # Needed to push a branch and open a PR
    permissions:
      contents: write
      pull-requests: write

    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install agent dependencies
        run: pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config --global user.name  "PromptGuard Agent"
          git config --global user.email "agent@promptguard.dev"

      - name: Run agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN:           ${{ github.event.inputs.dry_run }}
        run: |
          FLAGS="--audit ../proxy/audit.jsonl --dataset ../data/prompt_injections.jsonl"
          [ "$DRY_RUN" = "true" ] && FLAGS="$FLAGS --dry-run"
          python runner.py $FLAGS
