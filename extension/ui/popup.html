<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PromptGuard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0e1a;
      --card:     #111827;
      --border:   #1f2937;
      --border2:  #253046;
      --accent:   #7c3aed;
      --accent2:  #6d28d9;
      --red:      #ef4444;
      --orange:   #f97316;
      --green:    #22c55e;
      --blue:     #3b82f6;
      --sky:      #38bdf8;
      --txt1:     #f1f5f9;
      --txt2:     #94a3b8;
      --txt3:     #475569;
      --block-bg: rgba(239,68,68,0.12);
      --warn-bg:  rgba(249,115,22,0.12);
    }

    body {
      width: 380px;
      background: var(--bg);
      color: var(--txt1);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Header ──────────────────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 30px; height: 30px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(124,58,237,0.4);
    }

    .brand { flex: 1; }
    .brand h1 { font-size: 15px; font-weight: 700; color: var(--txt1); letter-spacing: -0.01em; }
    .brand span { font-size: 10px; color: var(--txt3); }

    /* Toggle switch */
    .toggle-wrap { display: flex; align-items: center; gap: 7px; }
    .toggle-label { font-size: 11px; color: var(--txt2); }
    .toggle {
      position: relative; width: 36px; height: 20px;
      cursor: pointer;
    }
    .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .slider {
      position: absolute; inset: 0;
      background: var(--txt3);
      border-radius: 20px;
      transition: background 0.2s;
    }
    .slider::after {
      content: "";
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::after { transform: translateX(16px); }

    /* ── Stats row ───────────────────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      background: var(--bg);
      padding: 16px 0 12px;
      text-align: center;
    }
    .stat .val {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .stat .lbl {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--txt3);
      margin-top: 4px;
    }
    .stat.bl .val { color: var(--red); }
    .stat.wa .val { color: var(--orange); }
    .stat.sc .val { color: var(--sky); }

    /* ── Section header ──────────────────────────────────────────────────── */
    .section-hd {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 16px 7px;
    }
    .section-hd span {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--txt3);
    }
    .period-toggle {
      display: flex;
      gap: 4px;
    }
    .period-btn {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent;
      color: var(--txt3);
      cursor: pointer;
      transition: all 0.15s;
    }
    .period-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Category bars ───────────────────────────────────────────────────── */
    .categories {
      padding: 0 16px 12px;
    }
    .cat-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
    }
    .cat-name {
      font-size: 11px;
      color: var(--txt2);
      width: 130px;
      flex-shrink: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .bar-track {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.4s ease;
    }
    .cat-count {
      font-size: 11px;
      font-weight: 600;
      color: var(--txt2);
      width: 24px;
      text-align: right;
      flex-shrink: 0;
    }
    .no-data {
      padding: 10px 16px;
      font-size: 12px;
      color: var(--txt3);
      text-align: center;
    }

    /* ── 7-day chart ─────────────────────────────────────────────────────── */
    .chart-wrap {
      padding: 0 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    #chart-svg {
      display: block;
      width: 100%;
      overflow: visible;
    }

    /* ── Events list ─────────────────────────────────────────────────────── */
    #event-list {
      max-height: 180px;
      overflow-y: auto;
    }
    #event-list::-webkit-scrollbar { width: 4px; }
    #event-list::-webkit-scrollbar-track { background: transparent; }
    #event-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .ev {
      border-bottom: 1px solid #151e2e;
      cursor: pointer;
      transition: background 0.1s;
    }
    .ev:last-child { border-bottom: none; }
    .ev:hover { background: rgba(255,255,255,0.02); }

    .ev-row {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 16px;
    }

    .badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      letter-spacing: 0.04em;
    }
    .badge.BLOCK { background: var(--block-bg); color: var(--red); }
    .badge.WARN  { background: var(--warn-bg);  color: var(--orange); }

    .ev-body { flex: 1; min-width: 0; }
    .ev-url {
      font-size: 11px;
      color: var(--txt2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ev-reason {
      font-size: 10px;
      color: var(--txt3);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ev-age {
      font-size: 10px;
      color: var(--txt3);
      flex-shrink: 0;
    }

    /* Expand arrow */
    .ev-arrow {
      font-size: 9px;
      color: var(--txt3);
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .ev.open .ev-arrow { transform: rotate(90deg); }

    /* Detail panel — animated via max-height; override at bottom of file */
    .ev-detail {
      padding: 0 16px;
      border-top: 1px solid #1a2230;
      background: rgba(255,255,255,0.01);
    }

    .ev-detail-row {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      margin-top: 7px;
      font-size: 11px;
    }
    .ev-detail-lbl {
      color: var(--txt3);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex-shrink: 0;
      width: 52px;
      padding-top: 1px;
    }
    .ev-detail-val {
      color: var(--txt2);
      flex: 1;
      min-width: 0;
      word-break: break-word;
      line-height: 1.5;
    }

    /* Score bar in detail */
    .ev-score-wrap { flex: 1; }
    .ev-score-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 5px;
    }
    .ev-score-bar-fill { height: 100%; border-radius: 2px; }

    /* Pattern chips */
    .ev-pattern-chip {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(99,102,241,0.12);
      color: #818cf8;
      margin: 1px 2px 1px 0;
    }

    /* Layer badge */
    .ev-layer {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.05);
      color: var(--txt3);
    }

    /* Copy button */
    .copy-prompt-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border2);
      color: var(--txt3);
      border-radius: 5px;
      padding: 4px 10px;
      font-size: 10px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .copy-prompt-btn:hover { color: var(--txt2); border-color: var(--txt3); }

    /* Smooth expand */
    .ev-detail {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.2s ease, padding 0.2s ease;
      padding-top: 0; padding-bottom: 0;
    }
    .ev.open .ev-detail {
      max-height: 400px;
      padding-top: 0;
      padding-bottom: 10px;
    }

    /* Prompt preview */
    .ev-prompt-preview {
      font-size: 10px;
      color: var(--txt3);
      font-family: "SF Mono", "Fira Mono", monospace;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 5px 8px;
      margin-top: 2px;
      line-height: 1.5;
      word-break: break-word;
      max-height: 60px;
      overflow: hidden;
      position: relative;
    }

    .empty {
      padding: 20px 16px;
      text-align: center;
      color: var(--txt3);
      font-size: 12px;
    }

    /* ── Gear button ─────────────────────────────────────────────────────── */
    .gear-btn {
      background: none;
      border: none;
      color: var(--txt3);
      font-size: 15px;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 5px;
      line-height: 1;
      transition: color 0.15s;
    }
    .gear-btn:hover { color: var(--txt2); }

    /* ── Session state pill ──────────────────────────────────────────────── */
    .session-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      transition: background 0.3s, color 0.3s;
    }
    .session-pill.safe       { background: rgba(34,197,94,0.12);  color: #22c55e; }
    .session-pill.suspicious { background: rgba(249,115,22,0.15); color: #f97316; }
    .session-pill.active     { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .session-pill.unknown    { background: rgba(71,85,105,0.15);  color: #475569; }
    .session-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse-dot 2s infinite;
    }
    .session-pill.safe .session-dot       { animation: none; }
    .session-pill.unknown .session-dot    { animation: none; }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* ── Delta stat ──────────────────────────────────────────────────────── */
    .stat .delta {
      font-size: 9px;
      font-weight: 600;
      color: var(--txt3);
      margin-top: 2px;
    }
    .stat.bl .delta.pos { color: var(--red); }
    .stat.wa .delta.pos { color: var(--orange); }
    .stat.sc .delta.pos { color: var(--sky); }

    /* ── Category icon ───────────────────────────────────────────────────── */
    .cat-icon { font-size: 12px; flex-shrink: 0; width: 18px; text-align: center; }

    /* ── Footer ──────────────────────────────────────────────────────────── */
    footer {
      padding: 9px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .ver { font-size: 10px; color: var(--txt3); }
    .clear-btn {
      font-size: 10px;
      color: var(--txt3);
      background: none;
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 3px 9px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .clear-btn:hover { color: var(--txt2); border-color: var(--txt3); }

    .sep { height: 1px; background: var(--border); }

    /* ── Global strip ────────────────────────────────────────────────────── */
    .global-strip {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 6px 16px;
      background: rgba(124,58,237,0.06);
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      color: var(--txt3);
    }
    .global-tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.07em;
      padding: 1px 5px;
      border-radius: 3px;
      background: rgba(124,58,237,0.2);
      color: #a78bfa;
    }
    .global-strip .g-num {
      font-weight: 700;
      color: var(--txt2);
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="logo">🛡</div>
  <div class="brand">
    <h1>PromptGuard</h1>
    <span>AI Firewall</span>
  </div>
  <div class="toggle-wrap">
    <span class="toggle-label" id="toggle-lbl">Active</span>
    <label class="toggle" title="Enable / disable scanning">
      <input type="checkbox" id="enabled-toggle" checked />
      <span class="slider"></span>
    </label>
    <button class="gear-btn" id="gear-btn" title="Settings">⚙</button>
  </div>
</header>

<!-- Session state pill -->
<div style="padding: 6px 16px 0; display:flex; align-items:center; gap:8px;">
  <span style="font-size:10px;color:var(--txt3);">Session:</span>
  <span class="session-pill unknown" id="session-pill">
    <span class="session-dot"></span>
    <span id="session-label">—</span>
  </span>
  <span style="font-size:9px;color:var(--txt3);margin-left:auto;" id="session-risk"></span>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat bl">
    <div class="val" id="s-blocked">—</div>
    <div class="lbl">Blocked</div>
    <div class="delta" id="d-blocked"></div>
  </div>
  <div class="stat wa">
    <div class="val" id="s-warned">—</div>
    <div class="lbl">Warned</div>
    <div class="delta" id="d-warned"></div>
  </div>
  <div class="stat sc">
    <div class="val" id="s-scanned">—</div>
    <div class="lbl">Scanned</div>
    <div class="delta" id="d-scanned"></div>
  </div>
</div>

<!-- Global stats strip (shown only when proxy responds) -->
<div class="global-strip" id="global-strip" style="display:none">
  <span class="global-tag">GLOBAL</span>
  <span class="g-num" id="g-blocked">—</span> blocked &nbsp;·&nbsp;
  <span class="g-num" id="g-total">—</span> total across all users
</div>

<!-- Category breakdown -->
<div class="section-hd">
  <span>Attack Categories</span>
  <div class="period-toggle">
    <button class="period-btn active" data-p="today">Today</button>
    <button class="period-btn" data-p="all">All time</button>
  </div>
</div>
<div class="categories" id="cat-list"></div>

<div class="sep"></div>

<!-- 7-day chart -->
<div class="section-hd">
  <span>Last 7 Days</span>
</div>
<div class="chart-wrap">
  <svg id="chart-svg" height="72" viewBox="0 0 348 72" preserveAspectRatio="none"></svg>
</div>

<!-- Recent events -->
<div class="section-hd" style="padding-bottom:4px">
  <span>Recent Threats</span>
</div>
<div id="event-list">
  <div class="empty" id="empty-msg">No threats detected yet.</div>
</div>

<!-- Footer -->
<footer>
  <span class="ver">v0.2.0 · L1 + L2 + L3</span>
  <button class="clear-btn" id="clear-btn">Clear data</button>
</footer>

<script src="popup.js"></script>
</body>
</html>
